<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel数据分析工具</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #0ea5e9;
            --accent: #f59e0b;
            --success: #22c55e;
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.85);
            --text: #1e293b;
            --text-light: #64748b;
            --border: rgba(226, 232, 240, 0.8);
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
            background: 
                radial-gradient(ellipse at top left, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(14, 165, 233, 0.15) 0%, transparent 50%),
                linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
        
        /* 头部 - 现代简约 */
        .header { 
            text-align: center; 
            margin-bottom: 50px;
            padding: 20px 0;
        }
        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 50px;
            color: var(--primary);
            font-size: 0.9em;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .header h1 { 
            font-size: 3.2em; 
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .header p { 
            color: var(--text-light);
            font-size: 1.25em;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 400;
        }
        
        /* 上传区域 - 玻璃拟态 */
        .upload-card {
            max-width: 600px;
            margin: 0 auto 50px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.02),
                0 10px 15px -3px rgba(0, 0, 0, 0.05),
                0 20px 40px -12px rgba(99, 102, 241, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .upload-card:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 20px 25px -5px rgba(0, 0, 0, 0.08),
                0 10px 10px -5px rgba(0, 0, 0, 0.02),
                0 30px 60px -15px rgba(99, 102, 241, 0.2);
        }
        
        .upload-area { 
            border: 3px dashed #cbd5e1;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.5);
        }
        .upload-area:hover, .upload-area.dragover { 
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }
        .upload-area.dragover {
            box-shadow: inset 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        
        .upload-icon { 
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            box-shadow: 0 20px 40px -15px rgba(99, 102, 241, 0.4);
        }
        .upload-area h3 {
            color: var(--text);
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .upload-area > p {
            color: var(--text-light);
            margin-bottom: 28px;
            font-size: 1em;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 16px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px -15px rgba(99, 102, 241, 0.6);
        }
        .btn-primary:active {
            transform: translateY(-1px);
        }
        
        .file-input { display: none; }
        
        .file-info { 
            margin-top: 24px;
            padding: 20px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 16px;
            display: none;
            color: var(--success);
            font-weight: 500;
        }
        .file-info.show { display: block; animation: slideDown 0.3s ease; }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 分析区域 */
        .analysis-section { display: none; margin-top: 40px; }
        .analysis-section.show { display: block; animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section-header { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .section-title {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text);
        }
        .section-title span {
            color: var(--text-light);
            font-weight: 400;
            font-size: 0.6em;
            margin-left: 12px;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .btn-secondary {
            background: white;
            color: var(--text);
            padding: 12px 24px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            background: var(--bg);
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-accent {
            background: linear-gradient(135deg, var(--accent) 0%, #f97316 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        .btn-accent:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
        }
        
        /* 标签页 - 胶囊设计 */
        .tabs-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 20px;
            margin-bottom: 28px;
            display: inline-flex;
            gap: 4px;
            border: 1px solid var(--border);
        }
        .tab {
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 0.95em;
            font-weight: 500;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            background: transparent;
        }
        .tab:hover {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }
        .tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.1);
            font-weight: 600;
        }
        
        /* 内容卡片 */
        .content-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        
        /* 统计网格 */
        .stats-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card { 
            background: white;
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        .stat-card:hover { 
            transform: translateY(-6px);
            box-shadow: 0 20px 40px -15px rgba(99, 102, 241, 0.2);
        }
        .stat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
        }
        .stat-icon.blue { background: rgba(99, 102, 241, 0.1); }
        .stat-icon.green { background: rgba(34, 197, 94, 0.1); }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.1); }
        .stat-card h3 { 
            color: var(--text-light);
            font-size: 0.9em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value { 
            font-size: 2.6em;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .stat-card .meta {
            color: var(--text-light);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-card .meta .positive { color: var(--success); }
        .stat-card .meta .negative { color: #ef4444; }
        
        /* 数据摘要 */
        .summary-card { 
            background: white;
            padding: 28px;
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }
        .summary-card h3 { 
            margin-bottom: 20px;
            color: var(--text);
            font-size: 1.2em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .summary-row { 
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 1em;
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-row span:first-child { color: var(--text-light); }
        .summary-row span:last-child { 
            font-weight: 600;
            color: var(--primary);
        }
        
        /* 选择器 */
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-group label { 
            color: var(--text-light);
            font-size: 0.9em;
            font-weight: 500;
        }
        .control-group select { 
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 0.95em;
            background: white;
            color: var(--text);
            min-width: 200px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .control-group select:focus { 
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }
        
        /* 图表容器 */
        .chart-wrapper { 
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
        }
        .chart-container { 
            position: relative;
            height: 450px;
        }
        
        /* 数据表格 */
        .table-wrapper {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
        }
        .data-table { 
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        .data-table th, .data-table td { 
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .data-table tr:nth-child(even) { background: #f8fafc; }
        .data-table tr:hover { background: rgba(99, 102, 241, 0.05); }
        .data-table td { color: var(--text); font-size: 0.95em; }
        .data-table tr:last-child td { border-bottom: none; }
        
        /* 学生分析 */
        .student-profile {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 2px solid var(--border);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            color: white;
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.4);
        }
        .profile-info h3 {
            font-size: 1.6em;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        .profile-info p {
            color: var(--text-light);
            font-size: 1em;
        }
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .profile-stat {
            text-align: center;
            padding: 20px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 16px;
        }
        .profile-stat .number {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--primary);
        }
        .profile-stat .label {
            font-size: 0.85em;
            color: var(--text-light);
            margin-top: 4px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .header h1 { font-size: 2.2em; }
            .upload-card { padding: 32px 24px; }
            .upload-area { padding: 40px 24px; }
            .section-header { flex-direction: column; align-items: flex-start; }
            .tabs-container { width: 100%; overflow-x: auto; }
            .tab { padding: 12px 20px; white-space: nowrap; }
            .stats-grid { grid-template-columns: 1fr; }
            .control-bar { flex-direction: column; align-items: stretch; }
            .control-group { flex-direction: column; align-items: stretch; }
            .control-group select { width: 100%; }
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--primary), var(--secondary));
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-badge">✨ 智能数据分析</div>
            <h1>Excel 数据分析工具</h1>
            <p>上传 Excel 文件，自动生成可视化分析报告</p>
        </div>
        
        <div class="upload-card" id="uploadCard">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📊</div>
                <h3>拖拽文件到此处</h3>
                <p>或点击按钮选择 .xlsx / .xls 文件</p>
                <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">
                <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                    <span>📁</span> 选择文件
                </button>
                <div class="file-info" id="fileInfo"></div>
            </div>
        </div>
        
        <div class="analysis-section" id="analysisSection">
            <div class="section-header">
                <h2 class="section-title">分析结果 <span id="fileName"></span></h2>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="resetAnalysis()">
                        <span>↺</span> 重新上传
                    </button>
                    <button class="btn-accent" onclick="exportToExcel()">
                        <span>⬇</span> 导出结果
                    </button>
                </div>
            </div>
            
            <div class="tabs-container">
                <button class="tab active" onclick="switchTab('overview', this)">📊 数据概览</button>
                <button class="tab" onclick="switchTab('statistics', this)">📈 统计分析</button>
                <button class="tab" onclick="switchTab('visualization', this)">🎨 可视化</button>
                <button class="tab" onclick="switchTab('details', this)">📋 详细数据</button>
            </div>
            
            <div class="content-card">
                <div id="overview" class="tab-content active">
                    <div class="summary-card" id="dataSummary"></div>
                    <div class="stats-grid" id="statsGrid"></div>
                </div>
                
                <div id="statistics" class="tab-content">
                    <div class="control-bar">
                        <div class="control-group">
                            <label>分析列：</label>
                            <select id="columnSelect"></select>
                        </div>
                        <button class="btn-primary" onclick="analyzeColumn()">分析</button>
                    </div>
                    <div id="columnAnalysis"></div>
                    <div class="student-profile">
                        <div class="control-bar">
                            <div class="control-group">
                                <label>选择学生：</label>
                                <select id="studentSelect"></select>
                            </div>
                            <button class="btn-primary" onclick="analyzeStudent()">查看画像</button>
                        </div>
                        <div id="studentAnalysis"></div>
                    </div>
                </div>
                
                <div id="visualization" class="tab-content">
                    <div class="control-bar">
                        <div class="control-group">
                            <label>图表类型：</label>
                            <select id="chartType">
                                <option value="bar">📊 柱状图</option>
                                <option value="line">📈 折线图</option>
                                <option value="pie">🥧 饼图</option>
                                <option value="doughnut">🍩 环形图</option>
                                <option value="radar">🕸️ 雷达图</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>X 轴：</label>
                            <select id="xColumn"></select>
                        </div>
                        <div class="control-group">
                            <label>Y 轴：</label>
                            <select id="yColumn"></select>
                        </div>
                        <button class="btn-primary" onclick="createChart()">生成图表</button>
                    </div>
                    <div class="chart-wrapper">
                        <div class="chart-container">
                            <canvas id="dataChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <div id="details" class="tab-content">
                    <div class="table-wrapper">
                        <table class="data-table" id="dataTable">
                            <thead id="tableHead"></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
/* ========== 全局变量 ========== */
let rawMatrix = [], headers = [], students = [], chartInst = null, radarInst = null;
let isProcessing = false; // 防止重复处理

/* ========== 文件上传 ========== */
const uploadArea  = document.getElementById('uploadArea');
const fileInput   = document.getElementById('fileInput');
const analysisSec = document.getElementById('analysisSection');
const uploadCard  = document.getElementById('uploadCard');
const fileInfo    = document.getElementById('fileInfo');

uploadArea.addEventListener('click', (e) => {
    if (e.target !== fileInput) fileInput.click();
});
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => { 
    e.preventDefault(); 
    uploadArea.classList.remove('dragover'); 
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]); 
});
fileInput.addEventListener('change', e => {
    if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

function handleFile(file) {
    if (isProcessing) return; // 防止重复
    isProcessing = true;
    
    if (!file.name.match(/\.(xlsx|xls)$/)) {
        alert('请上传 Excel 文件（.xlsx 或 .xls 格式）');
        isProcessing = false;
        return;
    }

    // 显示文件信息
    fileInfo.innerHTML = `
        <strong>✓ 已选择：</strong>${file.name}<br>
        <small>大小：${(file.size / 1024).toFixed(2)} KB</small>
    `;
    fileInfo.classList.add('show');

    const reader = new FileReader();
    reader.onload = evt => {
        try {
            const wb = XLSX.read(evt.target.result, { type: 'array' });
            parseData(wb.Sheets[wb.SheetNames[0]], file.name);
        } catch (e) { 
            alert('解析失败：' + e.message); 
            isProcessing = false;
        }
    };
    reader.onerror = () => {
        alert('文件读取失败');
        isProcessing = false;
    };
    reader.readAsArrayBuffer(file);
}

/* ========== 数据清洗 ========== */
function parseData(sheet, filename) {
    // 扩大解析范围
    const ref = sheet['!ref'];
    if (!ref) {
        alert('无法读取表格范围');
        isProcessing = false;
        return;
    }
    
    const rng = XLSX.utils.decode_range(ref);
    rng.s.r = 0; rng.s.c = 0;
    sheet['!ref'] = XLSX.utils.encode_range(rng);
    
    const mat = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

    // 找到真正的表头行（含"序号"）
    let headRow = -1;
    for (let i = 0; i < Math.min(15, mat.length); i++) {
        const firstCell = String(mat[i][0] || '').trim();
        if (firstCell.includes('序号') || firstCell === '序号') {
            headRow = i;
            break;
        }
    }
    
    if (headRow === -1) {
        // 如果没找到"序号"，尝试找第一个有内容的行
        for (let i = 0; i < Math.min(10, mat.length); i++) {
            if (mat[i].some(c => c !== '' && c !== null && c !== undefined)) {
                headRow = i;
                break;
            }
        }
    }
    
    if (headRow === -1 || headRow >= mat.length) {
        alert('无法识别表格结构，请检查文件格式');
        isProcessing = false;
        return;
    }

    headers = mat[headRow].map(h => String(h || '').trim()).filter(h => h !== '');
    rawMatrix = mat.slice(headRow + 1).filter(r => r.some(c => c !== '' && c !== null && c !== undefined));
    
    // 转换为对象数组
    students = rawMatrix.map((row, idx) => {
        const obj = { _rowIndex: idx + 1 };
        headers.forEach((h, i) => { 
            obj[h] = row[i] !== undefined ? row[i] : ''; 
        });
        return obj;
    });

    // 显示文件名
    document.getElementById('fileName').textContent = `- ${filename}`;

    // 切换界面
    uploadCard.style.display = 'none';
    analysisSec.classList.add('show');
    
    buildPage();
    isProcessing = false;
}

/* ========== 页面构建 ========== */
function buildPage() {
    // 数据概览
    const courseCols = headers.filter(h => h.includes('-') || /^\d/.test(h));
    const rankCol = headers.find(h => h.includes('学分加权平均成绩')) || headers[headers.length - 3];
    
    document.getElementById('dataSummary').innerHTML = `
        <h3><span>📋</span> 数据概览</h3>
        <div class="summary-row"><span>学生总数</span><span>${students.length} 人</span></div>
        <div class="summary-row"><span>数据列数</span><span>${headers.length} 列</span></div>
        <div class="summary-row"><span>课程数量</span><span>${courseCols.length} 门</span></div>
        <div class="summary-row"><span>排名依据</span><span>${rankCol}</span></div>
    `;

    // 统计卡片
    let cardHtml = '';
    courseCols.slice(0, 6).forEach(c => {
        const scores = students.map(s => Number(s[c])).filter(v => !isNaN(v) && v > 0);
        if (scores.length < 3) return;
        const avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
        const max = Math.max(...scores).toFixed(0);
        const min = Math.min(...scores).toFixed(0);
        const passRate = ((scores.filter(s => s >= 60).length / scores.length) * 100).toFixed(0);
        
        cardHtml += `
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon blue">📚</div>
                    <h3>${c.length > 20 ? c.slice(0, 18) + '…' : c}</h3>
                </div>
                <div class="value">${avg}</div>
                <div class="meta">
                    <span>最高 ${max}</span> · <span>最低 ${min}</span> · <span class="${passRate >= 90 ? 'positive' : ''}">及格率 ${passRate}%</span>
                </div>
            </div>`;
    });
    document.getElementById('statsGrid').innerHTML = cardHtml || '<p style="color: #64748b;">暂无课程数据</p>';

    // 填充下拉框
    const opts = headers.map(h => `<option value="${h}">${h.length > 30 ? h.slice(0, 28) + '…' : h}</option>`).join('');
    ['columnSelect', 'xColumn', 'yColumn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = opts;
    });

    // 填充学生列表
    fillStudentList();

    // 渲染表格
    renderTable();
}

function fillStudentList() {
    const sel = document.getElementById('studentSelect');
    if (!sel) return;
    const nameCol = headers.find(h => h.includes('姓名')) || headers[3];
    const idCol = headers.find(h => h.includes('学号')) || headers[2];
    
    sel.innerHTML = students.map((s, i) => {
        const name = s[nameCol] || `学生${i+1}`;
        const id = s[idCol] || '';
        return `<option value="${i}">${name}${id ? ` (${id})` : ''}</option>`;
    }).join('');
}

/* ========== 列统计分析 ========== */
function analyzeColumn() {
    const col = document.getElementById('columnSelect').value;
    const values = students.map(s => s[col]);
    const nums = values.map(v => Number(v)).filter(v => !isNaN(v) && v !== 0);
    
    if (nums.length === 0) {
        // 文本统计
        const freq = {};
        values.forEach(v => { freq[v] = (freq[v] || 0) + 1; });
        const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 10);
        
        document.getElementById('columnAnalysis').innerHTML = `
            <div class="summary-card">
                <h3><span>📝</span> ${col} - 文本分布</h3>
                ${sorted.map(([k, v]) => `
                    <div class="summary-row"><span>${k || '(空)'}</span><span>${v} 次 (${(v/students.length*100).toFixed(1)}%)</span></div>
                `).join('')}
            </div>`;
        return;
    }

    // 数值统计
    const avg = nums.reduce((a, b) => a + b, 0) / nums.length;
    const max = Math.max(...nums);
    const min = Math.min(...nums);
    const std = Math.sqrt(nums.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / nums.length);
    
    // 分段
    const ranges = [[0, 60, '不及格', '#ef4444'], [60, 70, '及格', '#f59e0b'], [70, 80, '中等', '#0ea5e9'], 
                   [80, 90, '良好', '#22c55e'], [90, 100, '优秀', '#6366f1']];
    const dist = ranges.map(([minR, maxR, label, color]) => {
        const count = nums.filter(n => n >= minR && n < maxR).length;
        const pct = (count / nums.length * 100).toFixed(1);
        return { label, count, pct, color };
    });

    document.getElementById('columnAnalysis').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header"><div class="stat-icon blue">📊</div><h3>平均值</h3></div>
                <div class="value">${avg.toFixed(2)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><div class="stat-icon green">🏆</div><h3>最高分</h3></div>
                <div class="value">${max.toFixed(1)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><div class="stat-icon orange">⚠️</div><h3>最低分</h3></div>
                <div class="value">${min.toFixed(1)}</div>
            </div>
            <div class="stat-card">
                <div class="stat-header"><div class="stat-icon blue">📈</div><h3>标准差</h3></div>
                <div class="value">${std.toFixed(2)}</div>
            </div>
        </div>
        <div class="summary-card" style="margin-top: 24px;">
            <h3><span>📊</span> 分数段分布</h3>
            ${dist.map(d => `
                <div class="summary-row">
                    <span style="display:flex;align-items:center;gap:8px;">
                        <span style="width:12px;height:12px;border-radius:50%;background:${d.color};"></span>
                        ${d.label}
                    </span>
                    <span>${d.count} 人 (${d.pct}%)</span>
                </div>
            `).join('')}
        </div>`;
}

/* ========== 学生个人分析 ========== */
function analyzeStudent() {
    const idx = document.getElementById('studentSelect').value;
    const st = students[idx];
    if (!st) return;

    const courseCols = headers.filter(h => h.includes('-') || /^\d/.test(h));
    const scores = courseCols.map(c => {
        const v = Number(st[c]);
        return { course: c, score: isNaN(v) ? 0 : v, raw: st[c] };
    }).filter(s => s.score > 0);

    if (scores.length === 0) {
        document.getElementById('studentAnalysis').innerHTML = '<p style="color: #64748b;">该学生暂无成绩数据</p>';
        return;
    }

    const avg = (scores.reduce((a, b) => a + b.score, 0) / scores.length).toFixed(2);
    const max = Math.max(...scores.map(s => s.score));
    const min = Math.min(...scores.map(s => s.score));
    
    // 排名
    const rankCol = headers.find(h => h.includes('学分加权平均成绩')) || headers[headers.length - 3];
    const allScores = students.map(s => Number(s[rankCol])).filter(v => !isNaN(v) && v > 0).sort((a, b) => b - a);
    const myScore = Number(st[rankCol]);
    const rank = allScores.indexOf(myScore) + 1;

    const nameCol = headers.find(h => h.includes('姓名')) || '姓名';
    const idCol = headers.find(h => h.includes('学号')) || '学号';
    const classCol = headers.find(h => h.includes('班级')) || '班级';

    let html = `
        <div class="profile-header">
            <div class="profile-avatar">👤</div>
            <div class="profile-info">
                <h3>${st[nameCol] || '未知'}</h3>
                <p>学号：${st[idCol] || '-'} | 班级：${st[classCol] || '-'} | 排名：第 ${rank} / ${students.length}</p>
            </div>
        </div>
        <div class="profile-stats">
            <div class="profile-stat"><div class="number">${avg}</div><div class="label">平均分</div></div>
            <div class="profile-stat"><div class="number">${max}</div><div class="label">最高分</div></div>
            <div class="profile-stat"><div class="number">${min}</div><div class="label">最低分</div></div>
            <div class="profile-stat"><div class="number">${scores.length}</div><div class="label">课程数</div></div>
        </div>
        <div class="table-wrapper" style="margin-bottom: 24px;">
            <table class="data-table">
                <thead><tr><th>课程</th><th>成绩</th><th>等级</th></tr></thead>
                <tbody>
                    ${scores.map(s => {
                        const level = s.score >= 90 ? '优秀' : s.score >= 80 ? '良好' : s.score >= 70 ? '中等' : s.score >= 60 ? '及格' : '不及格';
                        const color = s.score >= 90 ? '#22c55e' : s.score >= 80 ? '#0ea5e9' : s.score >= 70 ? '#6366f1' : s.score >= 60 ? '#f59e0b' : '#ef4444';
                        return `<tr><td>${s.course.length > 25 ? s.course.slice(0, 23) + '…' : s.course}</td><td style="color:${color};font-weight:600;">${s.score}</td><td>${level}</td></tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>
        <div class="chart-wrapper">
            <div class="chart-container">
                <canvas id="radarChart"></canvas>
            </div>
        </div>
    `;
    
    document.getElementById('studentAnalysis').innerHTML = html;

    // 雷达图
    const ctx = document.getElementById('radarChart');
    if (radarInst) radarInst.destroy();
    
    const shortLabels = scores.map(s => s.course.length > 10 ? s.course.slice(0, 8) + '…' : s.course);
    radarInst = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: shortLabels,
            datasets: [{
                label: st[nameCol] + ' 成绩分布',
                data: scores.map(s => s.score),
                backgroundColor: 'rgba(99, 102, 241, 0.2)',
                borderColor: '#6366f1',
                borderWidth: 2,
                pointBackgroundColor: '#6366f1',
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: '#6366f1'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                r: {
                    beginAtZero: true,
                    max: 100,
                    ticks: { stepSize: 20, backdropColor: 'transparent' },
                    grid: { color: 'rgba(0,0,0,0.05)' },
                    angleLines: { color: 'rgba(0,0,0,0.05)' }
                }
            },
            plugins: {
                legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true } }
            }
        }
    });
}

/* ========== 可视化 ========== */
function createChart() {
    const type = document.getElementById('chartType').value;
    const xCol = document.getElementById('xColumn').value;
    const yCol = document.getElementById('yColumn').value;
    
    const data = students.map(s => ({
        x: s[xCol],
        y: Number(s[yCol])
    })).filter(d => d.x != null && !isNaN(d.y) && d.y > 0);

    if (data.length === 0) {
        alert('无有效数据，请更换坐标轴');
        return;
    }

    // 限制数据点
    const limited = data.slice(0, 30);
    const labels = limited.map(d => String(d.x).length > 15 ? String(d.x).slice(0, 13) + '…' : d.x);
    const values = limited.map(d => d.y);

    const ctx = document.getElementById('dataChart');
    if (chartInst) chartInst.destroy();

    const colors = ['#6366f1', '#0ea5e9', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6'];
    
    chartInst = new Chart(ctx, {
        type,
        data: {
            labels,
            datasets: [{
                label: yCol,
                data: values,
                backgroundColor: type === 'pie' || type === 'doughnut' 
                    ? values.map((_, i) => colors[i % colors.length] + '80')
                    : '#6366f180',
                borderColor: type === 'pie' || type === 'doughnut'
                    ? values.map((_, i) => colors[i % colors.length])
                    : '#6366f1',
                borderWidth: 2,
                tension: 0.4,
                fill: type === 'radar' || type === 'line'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { 
                    display: type === 'pie' || type === 'doughnut' || type === 'radar',
                    position: 'bottom',
                    labels: { padding: 20, usePointStyle: true }
                }
            },
            scales: type !== 'pie' && type !== 'doughnut' && type !== 'radar' ? {
                y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                x: { grid: { display: false } }
            } : {}
        }
    });
}

/* ========== 详细表格 ========== */
function renderTable() {
    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');
    
    thead.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
    
    const rows = students.slice(0, 100).map(s => 
        `<tr>${headers.map(h => `<td>${s[h] ?? ''}</td>`).join('')}</tr>`
    ).join('');
    
    tbody.innerHTML = rows + (students.length > 100 
        ? `<tr><td colspan="${headers.length}" style="text-align:center;color:#64748b;padding:20px;">… 还有 ${students.length - 100} 行数据 …</td></tr>` 
        : '');
}

/* ========== 标签切换 ========== */
function switchTab(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    if (btn) btn.classList.add('active');
    else document.querySelector(`.tab[onclick*="'${name}'"]`)?.classList.add('active');
    
    document.getElementById(name).classList.add('active');
}

/* ========== 导出 ========== */
function exportToExcel() {
    const ws = XLSX.utils.json_to_sheet(students.map(s => {
        const { _rowIndex, ...data } = s;
        return data;
    }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "学生成绩");
    XLSX.writeFile(wb, `成绩分析_${new Date().toISOString().slice(0, 10)}.xlsx`);
}

/* ========== 重新上传 ========== */
function resetAnalysis() {
    // 销毁图表
    if (chartInst) { chartInst.destroy(); chartInst = null; }
    if (radarInst) { radarInst.destroy(); radarInst = null; }
    
    // 清空数据
    students = [];
    rawMatrix = [];
    headers = [];
    
    // 重置界面
    fileInput.value = '';
    fileInfo.classList.remove('show');
    fileInfo.innerHTML = '';
    analysisSec.classList.remove('show');
    uploadCard.style.display = 'block';
    
    // 清空内容
    document.getElementById('statsGrid').innerHTML = '';
    document.getElementById('columnAnalysis').innerHTML = '';
    document.getElementById('studentAnalysis').innerHTML = '';
    document.getElementById('fileName').textContent = '';
    
    // 重置标签
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === 0));
    document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === 0));
    
    isProcessing = false;
}
</script>
